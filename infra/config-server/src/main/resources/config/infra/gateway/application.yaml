spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: shopping_cart_service_route
          uri: lb://shopping-cart
          predicates:
            - Path=/shopping-cart/**
          filters:
            - PrefixPath=/api/v1
        - id: shopping_store_service_route
          uri: lb://shopping-store
          predicates:
            - Path=/shopping-store/**
          filters:
            - PrefixPath=/api/v1
            - name: Retry
              args:
                retries: 3
                statuses: NOT_FOUND
                methods: GET
                backoff:
                  firstBackoff: 10ms
                  maxBackoff: 50ms
                  factor: 2
                  basedOnPreviousValue: false

      discovery.locator.enabled: true
    routes:
      - id: shopping_cart_service_route
        uri: lb://shopping-cart

        predicates:
          - Path=/shopping-cart/**
        filters:
          - PrefixPath=/api/v1
server:
  port: 8080