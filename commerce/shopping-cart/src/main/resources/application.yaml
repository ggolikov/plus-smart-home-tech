spring:
  application:
    name: shopping-cart
  config:
    import: configserver:http://localhost:34735
  cloud:
    openfeign:
      enabled: false
    discovery:
      enabled: true
      serviceId: config-server
    fail-fast: true
    retry:
      useRandomPolicy: true
      max-interval: 6000
eureka:
  client:
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname:localhost}:${eureka.instance.port:8761}/eureka/
